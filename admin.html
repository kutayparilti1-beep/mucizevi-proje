<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Paneli - Bölüm Ekle</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 40px; }
        .form-box { background: #262626; max-width: 500px; margin: 0 auto; padding: 25px; border-radius: 8px; border: 2px solid #e60000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #444; background: #333; color: white; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        option { background: #262626; color: white; }
        button { background: #e60000; color: white; padding: 12px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #b30000; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>🛠️ Yeni İçerik / Bölüm Ekle</h2>
        <p style="color: #aaa;">Eklediğin içerik doğrudan seçtiğin sezon sekmesinde kalıcı olarak yayınlanır.</p>
        <form method="POST">
            
            <label>🎯 Sezon / Kategori Seçin:</label>
            <select name="sezon" required>
                <option value="1">1. Sezon</option>
                <option value="2">2. Sezon</option>
                <option value="3">3. Sezon</option>
                <option value="4">4. Sezon</option>
                <option value="5">5. Sezon</option>
                <option value="6">6. Sezon</option>
                <option value="ozel">✨ Özel Bölümler</option>
            </select>

            <input type="number" name="bolum_no" placeholder="Bölüm Sıra Numarası (Örn: 5)" required>
            <input type="text" name="baslik" placeholder="Bölüm Başlığı / Adı" required>
            <input type="url" name="link" placeholder="Video Linki (YouTube, Drive vb.)" required>
            <textarea name="aciklama" placeholder="Bölümün konusu nedir? Kısa bir özet yazın..." rows="4"></textarea>
            
            <button type="submit">💾 İçeriği Sisteme Kaydet</button>
        </form>
        <br>
        <div style="text-align: center;">
            <a href="/logout" style="color: #ff4757; text-decoration: none; font-size: 14px;">🚪 Güvenli Çıkış Yap</a> | 
            <a href="/" style="color: #aaa; text-decoration: none; font-size: 14px;">🏠 Ana Sayfaya Git</a>
        </div>
    </div>
</body>
</html>
