<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mucizevi Dünyasına Kayıt Ol</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #262626; padding: 30px; border-radius: 10px; border: 2px solid #e60000; width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #444; background: #333; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #e60000; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .google-btn { background: white; color: #333; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🐞 Kayıt Ol</h2>
        {% if hata %} <p style="color: #ff4757;">{{ hata }}</p> {% endif %}
        <form method="POST">
            <input type="text" name="ad" placeholder="Adınız ve Soyadınız" required>
            <input type="email" name="eposta" placeholder="E-posta Adresiniz" required>
            <input type="password" name="sifre" placeholder="Şifreniz" required>
            <button type="submit">Hesap Oluştur</button>
        </form>
        
        <button class="google-btn" onclick="alert('Google API Altyapısı İnternete Geçince Aktif Olacaktır!')">
            <img src="https://g.twimg.com/dev/documentation/image/gplus-logo-32.png" width="18" alt="G"> Google ile Kayıt Ol
        </button>

        <br><br>
        <a href="/login" style="color: #aaa; text-decoration: none; font-size: 14px;">Zaten hesabın var mı? Giriş Yap</a>
    </div>
</body>
</html>
